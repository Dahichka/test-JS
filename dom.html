<!DOCTYPE html>
<html>
<head>
    <title>Playing with a DOM</title>
</head>


<body>
    <h1 id="main-heading">Hello world!</h1>

    <script src="https://code.jquery.com/jquery-2.1.0.js"></script>
    <script>
        var newHeadingText = prompt("Please provide a heading:");
        $("#main-heading").text(newHeadingText);
        $("body").append("<p>This is a new paragraph</p>");
        for (var i = 0; i < 3; i = 0){
            var hobby = prompt("Tell me one  of your hobies!");
            if (hobby === null){break;}
            $("body").append("<p>" + hobby + "</p>");
        }
    </script>
</body>

</html>
